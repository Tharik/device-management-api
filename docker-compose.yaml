version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: device-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: device_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: src/DeviceManagement.Api/Dockerfile
    container_name: device-management-api
    depends_on:
      - mysql
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: server=mysql;port=3306;database=device_management;user=root;password=root
    ports:
      - "8080:8080"

volumes:
  mysql_data: